<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Protocolo OMEGA</title>
    <!-- Modern Stark Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --fg: #ffffff;
            --border: #ffffff;
            --text-muted: #a1a1aa;
            --card-bg: #09090b;
            --accent: #27272a;
        }
        body {
            background-color: var(--bg);
            color: var(--fg);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            overflow: hidden;
            box-sizing: border-box;
        }
        
        #brand-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .brand-title {
            font-size: 32px;
            font-weight: 900;
            letter-spacing: -0.06em;
            margin: 0;
            text-transform: uppercase;
            line-height: 1;
        }
        .brand-subtitle {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.25em;
            color: var(--text-muted);
            margin-top: 8px;
            text-transform: uppercase;
        }

        .container {
            background: var(--bg);
            width: 100%;
            max-width: 460px;
            padding: 35px;
            border: 2px solid var(--border);
            box-sizing: border-box;
            box-shadow: 8px 8px 0px rgba(255, 255, 255, 0.08);
        }
        
        /* Keygen UI */
        #keygen-view { display: none; text-align: center; }
        .prompt-text {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            margin-bottom: 24px;
            text-transform: uppercase;
        }
        input[type="password"] {
            background: #000000;
            color: #ffffff;
            border: 2px solid var(--border);
            padding: 15px;
            width: 100%;
            margin-bottom: 20px;
            font-family: inherit;
            font-size: 14px;
            font-weight: 500;
            outline: none;
            text-align: center;
            box-sizing: border-box;
        }
        input[type="password"]:focus {
            border-color: var(--text-muted);
        }
        
        button {
            background: #ffffff;
            color: #000000;
            border: 2px solid #ffffff;
            padding: 15px 20px;
            font-family: inherit;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            width: 100%;
            font-size: 12px;
            letter-spacing: 0.1em;
            box-sizing: border-box;
            transition: all 0.1s ease;
        }
        button:hover {
            background: #000000;
            color: #ffffff;
            border-color: #ffffff;
        }
        
        /* Boot UI */
        #boot-view { display: block; text-align: left; }
        .boot-header {
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        #progress-container {
            width: 100%;
            height: 2px;
            margin: 20px 0;
            background: var(--accent);
        }
        #progress-bar {
            background-color: #ffffff;
            height: 100%;
            width: 0%;
            transition: width 0.2s ease;
        }
        #status-text {
            color: var(--text-muted);
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
        
        /* Ready UI */
        #ready-view { display: none; text-align: center; }
        .status-badge {
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 0.15em;
            margin-bottom: 24px;
            border: 1px solid var(--border);
            display: inline-block;
            padding: 6px 12px;
            text-transform: uppercase;
        }
        .address-box {
            background: var(--card-bg);
            padding: 20px;
            border: 1px solid var(--accent);
            margin-bottom: 20px;
            text-align: left;
            box-sizing: border-box;
        }
        .address-label {
            color: var(--text-muted);
            font-size: 9px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
        .address-value {
            font-size: 12px;
            font-family: 'Courier New', Courier, monospace;
            word-break: break-all;
            color: #ffffff;
            user-select: all;
            border: 1px dashed var(--accent);
            padding: 10px;
            margin: 0;
            background: #000000;
        }
        .action-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 10px;
        }
        .action-row button {
            padding: 12px;
        }
        #open-dash {
            background: #ffffff;
            color: #000000;
        }
        #open-dash:hover {
            background: #000000;
            color: #ffffff;
        }
        #copy-onion {
            background: #000000;
            color: #ffffff;
            border-color: var(--border);
        }
        #copy-onion:hover {
            background: #ffffff;
            color: #000000;
        }
    </style>
</head>
<body>
    <div id="brand-header">
        <h1 class="brand-title">Protocolo OMEGA</h1>
        <div class="brand-subtitle">IRONCLAD v3.1</div>
    </div>

    <div class="container">
        <!-- KEYGEN VIEW -->
        <div id="keygen-view">
            <div class="prompt-text">Identity not found. Initializing enclave...</div>
            <input type="password" id="passphrase-input" placeholder="Master Passphrase (Min 12)">
            <button id="submit-key">Generate RSA-4096 Identity</button>
            <p id="keygen-error" style="color: #ff4545; display: none; margin-top: 15px; font-size: 11px; font-weight: 600; text-transform: uppercase;"></p>
        </div>

        <!-- BOOT VIEW -->
        <div id="boot-view">
            <div class="boot-header">Boot Sequence</div>
            <div id="progress-container"><div id="progress-bar"></div></div>
            <div id="status-text">Initializing Tor...</div>
        </div>

        <!-- READY VIEW -->
        <div id="ready-view">
            <div class="status-badge">Secure Relay Online</div>
            
            <div class="address-box">
                <div class="address-label">Public .onion Address</div>
                <pre class="address-value" id="onion-text">waiting.onion</pre>
            </div>

            <div class="address-box" style="margin-bottom: 24px;">
                <div class="address-label">Admin Access Path</div>
                <pre class="address-value" id="admin-route-text" style="font-size: 11px; opacity: 0.85;">/route</pre>
            </div>
            
            <div class="action-row">
                <button id="copy-onion">Copy Onion</button>
                <button id="open-dash">Admin Panel</button>
            </div>
        </div>
    </div>

    <script>
        const bootView = document.getElementById('boot-view');
        const keygenView = document.getElementById('keygen-view');
        const readyView = document.getElementById('ready-view');

        window.electronAPI.onNeedsKeygen(() => {
            bootView.style.display = 'none';
            keygenView.style.display = 'block';
        });

        document.getElementById('submit-key').onclick = async () => {
            const pwd = document.getElementById('passphrase-input').value;
            if (pwd.length < 12) {
                document.getElementById('keygen-error').textContent = 'Error: Min 12 chars required.';
                document.getElementById('keygen-error').style.display = 'block';
                return;
            }
            document.getElementById('submit-key').textContent = 'Generating...';
            document.getElementById('submit-key').disabled = true;
            
            const success = await window.electronAPI.submitPassphrase(pwd);
            if (success) {
                keygenView.style.display = 'none';
                bootView.style.display = 'block';
            }
        };

        window.electronAPI.onTorStatus((data) => {
            document.getElementById('progress-bar').style.width = data.percent + '%';
            document.getElementById('status-text').textContent = '[' + data.percent + '%] ' + data.status;
        });

        window.electronAPI.onSystemReady((data) => {
            bootView.style.display = 'none';
            readyView.style.display = 'block';
            document.getElementById('onion-text').textContent = data.onion;
            document.getElementById('admin-route-text').textContent = '/' + data.adminPath;
            
            document.getElementById('copy-onion').onclick = () => {
                navigator.clipboard.writeText(data.onion);
                const btn = document.getElementById('copy-onion');
                btn.textContent = 'Copied!';
                setTimeout(() => { btn.textContent = 'Copy Onion'; }, 2000);
            };

            document.getElementById('open-dash').onclick = () => window.electronAPI.openDashboard(`http://localhost:3000/${data.adminPath}`);
        });
    </script>
</body>
</html>
